<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HT 카오스 레이드 통합 보드</title>
    <!-- Tailwind CSS 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap');
        
        body {
            font-family: 'Inter', 'Malgun Gothic', -apple-system, sans-serif;
            background-color: #090a0f;
            user-select: none;
            overflow: hidden; /* 가로/세로 스크롤 절대 발생 방지 */
        }

        /* 세련된 다크 테마 카드 디자인 */
        .neon-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 1) 좌팔 (핑크 테마 네온 경고) */
        @keyframes blink-L {
            from { border-color: #374151; box-shadow: none; }
            to { border-color: #ec4899; background-color: #240b17; box-shadow: 0 0 15px rgba(236, 72, 153, 0.25); }
        }
        .danger-L { animation: blink-L 0.4s infinite alternate; }

        /* 2) 우팔 (하늘색 테마 네온 경고) */
        @keyframes blink-R {
            from { border-color: #374151; box-shadow: none; }
            to { border-color: #06b6d4; background-color: #0b1e2c; box-shadow: 0 0 15px rgba(6, 182, 212, 0.25); }
        }
        .danger-R { animation: blink-R 0.4s infinite alternate; }

        /* 3) 버프해제 (오렌지/레드 테마 경고) */
        @keyframes blink-dispel {
            from { border-color: #374151; box-shadow: none; }
            to { border-color: #f97316; background-color: #241108; box-shadow: 0 0 15px rgba(249, 115, 22, 0.25); }
        }
        .danger-dispel { animation: blink-dispel 0.4s infinite alternate; }

        /* 4) 버프해제/유혹 겹침 경고 (노란색) */
        @keyframes blink-overlap {
            from { border-color: #374151; box-shadow: none; }
            to { border-color: #eab308; background-color: #241d08; box-shadow: 0 0 15px rgba(234, 179, 8, 0.25); }
        }
        .danger-overlap { animation: blink-overlap 0.4s infinite alternate; }

        @keyframes pulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }
        .pulse-text { animation: pulse 0.5s infinite alternate; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between p-3 text-slate-200">

    <!-- 상단: 파티 초대기 구역 (화면 높이의 약 43% 차지) -->

        <div class="grid grid-cols-3 gap-3 flex-1 min-h-0 pb-1">
            
            <!-- 1) 좌측 유혹 (좌팔) -->

                <div id="card-L" onclick="startTempt('L')" class="neon-card flex-1 bg-[#111218] border border-slate-800 rounded-xl p-2.5 flex flex-col justify-between items-center cursor-pointer hover:bg-[#15161f]">

    <!-- 복사 상태 알림 모달 바 -->
    <div id="statusBar" class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-slate-950/90 border border-emerald-500/50 text-emerald-400 font-bold text-[11px] px-3 py-1.5 rounded-full shadow-lg hidden z-50"></div>

    <script>
        // 초대 복사 기능 (클립보드 API 폴백 지원)
        function copyInvite(name, element) {
            if (name === '??') return; // 공석은 복사 생략
            const command = `/파티초대 ${name}`;
            const tempArea = document.createElement("textarea");
            tempArea.value = command;
            document.body.appendChild(tempArea);
            tempArea.select();
            try {
                document.execCommand('copy');
                element.classList.add('bg-emerald-900/30', 'text-emerald-300');
                setTimeout(() => element.classList.remove('bg-emerald-900/30', 'text-emerald-300'), 400);

                const statusBar = document.getElementById('statusBar');
                statusBar.innerText = `✅ [ ${name} ] 초대 명령어 복사완료!`;
                statusBar.classList.remove('hidden');
                if (window.statusTimeout) clearTimeout(window.statusTimeout);
                window.statusTimeout = setTimeout(() => statusBar.classList.add('hidden'), 800);
            } catch (err) {
                console.error('복사 실패:', err);
            }
            document.body.removeChild(tempArea);
        }

        // 타이머 상태 데이터
        let tL = { id: null, time: -9999, last: -1 };
        let tR = { id: null, time: -9999, last: -1 };
        let tD = { id: null, time: -9999, max: 300, last: -1 };
        
        const T_TOTAL = 180; // 유혹 최대치 (3분)
        const OVERLAP_THRESHOLD_DISPEL = 20; // 겹침 위험 기준선

        // TTS 음성 오더 발성 함수
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.15; // 실시간 레이드 딜레이 감안 고속 오더
            window.speechSynthesis.speak(utterance);
        }

        // 유혹 타이머 제어 (L: 좌 / R: 우)
        function startTempt(side) {
            let target = (side === 'L') ? tL : tR;
            if (target.id) clearInterval(target.id);
            
            target.time = T_TOTAL;
            target.last = -1;
            updateUI();
            
            target.id = setInterval(() => {
                target.time--;
                
                // 유혹 타이머 잔여 10초 전 오더
                if (target.time === 10 && target.last !== 10) {
                    speak(side === 'L' ? "좌측 유혹 10초 전" : "우측 유혹 10초 전");
                    target.last = 10;
                }
                updateUI();
            }, 1000);
        }

        // 팔 파괴 (정지 기능)
        function stopTempt(side, event) {
            if (event) event.stopPropagation(); // 카드 클릭 감지 중복 차단
            let target = (side === 'L') ? tL : tR;
            if (target.id) {
                clearInterval(target.id);
                target.id = null;
            }
            target.time = -9999;
            target.last = -1;
            updateUI();
        }

        // 버프해제 (갈) 타이머 제어
        function startDisp() {
            if (tD.id) clearInterval(tD.id);
            tD.time = tD.max;
            tD.last = -1;
            updateUI();
            
            tD.id = setInterval(() => {
                tD.time--;
                
                // 공통 잔여 10초 전 오더
                if (tD.time === 10 && tD.last !== 10) {
                    speak("버프해제 10초 전");
                    tD.last = 10;
                }
                
                // 3분 모드 특수 오더 (시작 후 1분 50초 경과 = 잔여 1분 10초 / 70초 지점)
                if (tD.max === 180 && tD.time === 70 && tD.last !== 70) {
                    speak("버프해제 10초 전");
                    tD.last = 70;
                }
                updateUI();
            }, 1000);
        }

        // 주기 설정 
        function setDisp(seconds) {
            tD.max = seconds;
            document.getElementById('txt-max').innerText = seconds === 180 ? "3분" : "5분";
            document.getElementById('t-3m').className = seconds === 180 ? "px-2 text-[10px] font-bold rounded transition-all bg-orange-500 text-black" : "px-2 text-[10px] font-bold rounded transition-all bg-slate-800 text-slate-400 hover:text-white";
            document.getElementById('t-5m').className = seconds === 300 ? "px-2 text-[10px] font-bold rounded transition-all bg-orange-500 text-black" : "px-2 text-[10px] font-bold rounded transition-all bg-slate-800 text-slate-400 hover:text-white";
            
            if (tD.time !== -9999 && tD.time > tD.max) {
                tD.time = tD.max;
            }
            updateUI();
        }

        // 미세 시간 보정
        function tweakTempt(side, amount) {
            let target = (side === 'L') ? tL : tR;
            if (target.time !== -9999) {
                target.time += amount;
                updateUI();
            }
        }
        function tweakDisp(amount) {
            if (tD.time !== -9999) {
                tD.time += amount;
                updateUI();
            }
        }

        // 타이머 통합 초기화
        function changePhase() {
            window.speechSynthesis.cancel();
            if (tL.id) { clearInterval(tL.id); tL.id = null; }
            if (tR.id) { clearInterval(tR.id); tR.id = null; }
            if (tD.id) { clearInterval(tD.id); tD.id = null; }
            
            tL.time = -9999; tL.last = -1;
            tR.time = -9999; tR.last = -1;
            tD.time = -9999; tD.last = -1;
            updateUI();
        }

        // 카드 UI 새로고침 핵심 로직
        function updateUI() {
            // 겹침 경보 여부 계산 (버해 남은 시간이 20초 이하일 때)
            const isDispelActive = tD.time >= 0;
            const isDispelDanger = isDispelActive && tD.time <= OVERLAP_THRESHOLD_DISPEL;
            
            const isLOverlap = tL.time >= 0 && isDispelDanger;
            const isROverlap = tR.time >= 0 && isDispelDanger;

            // 좌측 카드 드로잉
            drawTemptCard('L', tL, isLOverlap);
            
            // 우측 카드 드로잉
            drawCard('R', tR, isROverlap);

            // 버프해제 카드 드로잉
            const dD = document.getElementById('display-D');
            const sD = document.getElementById('status-D');
            const cD = document.getElementById('card-D');
            
            dD.innerText = formatTime(tD.time, false);
            cD.className = "neon-card flex-1 bg-[#111218] border border-slate-800 rounded-xl p-2.5 flex flex-col justify-between items-center cursor-pointer hover:bg-[#15161f]";
            
            if (tD.time !== -9999) {
                if (tD.time < 0) {
                    dD.style.color = "#f87171";
                    sD.innerText = "⚠️ 초과! (리셋)";
                    sD.className = "w-full text-center text-xs font-bold py-1 rounded bg-red-950/20 border border-red-800/40 text-red-400 pulse-text";
                } else if (tD.time <= 20) {
                    dD.style.color = "#f87171";
                    sD.innerText = "⚠️ 위험!! (리셋)";
                    sD.className = "w-full text-center text-xs font-bold py-1 rounded bg-orange-950/20 border border-orange-800/40 text-orange-400";
                    if (tD.time <= 15) {
                        cD.classList.add('danger-dispel');
                    }
                } else {
                    dD.style.color = "#ef4444";
                    sD.innerText = "진행중 (리셋)";
                    sD.className = "w-full text-center text-xs font-bold py-1 rounded bg-slate-950/40 border border-slate-900/40 text-slate-400";
                }
            } else {
                dD.style.color = "#fbbf24";
                sD.innerText = "클릭 시작";
                sD.className = "w-full text-center text-xs font-bold py-1 rounded bg-slate-950/40 border border-slate-900/40 text-slate-400";
            }
        }

        // 유혹 카드용 갱신 유틸 (하늘색/핑크색 호환)
        function drawTemptCard(side, targetObj, isOverlap) {
            const disp = document.getElementById('display-' + side);
            const stat = document.getElementById('status-' + side);
            const card = document.getElementById('card-' + side);
            const overlapBadge = document.getElementById('overlap-alert-' + side);
            
            disp.innerText = formatTime(targetObj.time, true);
            card.className = "neon-card flex-1 bg-[#111218] border border-slate-800 rounded-xl p-2.5 flex flex-col justify-between items-center cursor-pointer hover:bg-[#15161f]";
            
            if (isOverlap) {
                overlapBadge.classList.remove('hidden');
                card.classList.add('danger-overlap');
            } else {
                overlapBadge.classList.add('hidden');
            }

            if (targetObj.time !== -9999) {
                if (targetObj.time < 0) {
                    disp.style.color = "#f87171";
                    stat.innerText = "⚠️ 초과! (리셋)";
                    stat.className = "w-full text-center text-xs font-bold py-1 rounded bg-red-950/20 border border-red-800/40 text-red-400 pulse-text";
                } else if (targetObj.time <= 10) {
                    disp.style.color = "#34d399";
                    stat.innerText = "🛡️ 실드!! (리셋)";
                    stat.className = "w-full text-center text-xs font-bold py-1 rounded bg-emerald-950/20 border border-emerald-800/40 text-emerald-400";
                    if (!isOverlap) {
                        card.classList.add('danger-' + side);
                    }
                } else {
                    disp.style.color = "#ef4444";
                    stat.innerText = "진행중 (리셋)";
                    stat.className = "w-full text-center text-xs font-bold py-1 rounded bg-slate-950/40 border border-slate-900/40 text-slate-400";
                }
            } else {
                disp.style.color = "#4b5563";
                stat.innerText = "정지됨";
                stat.className = "w-full text-center text-xs font-bold py-1 rounded bg-slate-950/40 border border-slate-900/40 text-slate-400";
                disp.innerText = "OFF";
            }
        }

        // 호환성용 우측 카드 가리키기용 래퍼
        function drawCard(side, targetObj, isOverlap) {
            drawTemptCard(side, targetObj, isOverlap);
        }

        // 초단위 데이터를 분:초 형태 문자열로 포맷 가공
        function formatTime(seconds, isArm) {
            if (seconds === -9999) return isArm ? "OFF" : "READY";
            const isNeg = seconds < 0;
            const absSec = Math.abs(seconds);
            const min = Math.floor(absSec / 60);
            const sec = absSec % 60;
            return `${isNeg ? '-' : ''}${min}:${sec < 10 ? '0' : ''}${sec}`;
        }
    </script>
</body>
</html>
